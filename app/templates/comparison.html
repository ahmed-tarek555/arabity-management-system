<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>مقايسة سيارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-slate-100">

<div class="max-w-5xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-6">مقايسة سيارة</h1>

    <form id="comparisonForm" class="space-y-4">

        <!-- Basic info -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input name="customer" required placeholder="اسم العميل" class="p-2 rounded bg-slate-800" />
            <input name="phone" placeholder="رقم الهاتف" class="p-2 rounded bg-slate-800" />
            <input name="carModel" required placeholder="موديل السيارة" class="p-2 rounded bg-slate-800" />
            <input name="plate" required placeholder="رقم اللوحة" class="p-2 rounded bg-slate-800" />
        </div>

        <!-- ITEM (single choice) -->
        <div>
            <h3 class="mb-2 font-semibold">📋 البند (اختيار واحد)</h3>
            <div id="itemsContainer" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
        </div>

        <!-- DESCRIPTION (multi choice) -->
        <div>
            <h3 class="mb-2 font-semibold">✏️ الوصف (متعدد)</h3>
            <div id="descriptionsContainer" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
        </div>

        <!-- PRICES -->
        <div>
            <h3 class="mb-2 font-semibold">💰 السعر</h3>
            <div id="pricesContainer" class="space-y-3"></div>
        </div>

        <!-- TOTAL -->
        <div class="bg-indigo-600 p-4 rounded">
            <div id="totalDisplay" class="font-bold">✨ اختر من الخيارات أعلاه</div>
            <input id="finalPrice" name="finalPrice" readonly class="mt-2 p-2 rounded text-black w-full" />
        </div>

        <!-- NOTES -->
        <textarea name="notes" placeholder="ملاحظات" class="w-full p-2 rounded bg-slate-800"></textarea>

        <!-- error message -->
        <div id="formError" class="text-red-400 font-semibold"></div>

        <!-- SIGNATURES -->
        <div class="grid md:grid-cols-2 gap-4">
            <div>
                <p class="mb-2">✍️ توقيع المسئول</p>
                <canvas id="delegateCanvas" width="300" height="100" class="bg-white rounded"></canvas>
            </div>
            <div>
                <p class="mb-2">✍️ توقيع العميل</p>
                <canvas id="customerCanvas" width="300" height="100" class="bg-white rounded"></canvas>
            </div>
        </div>

        <button class="w-full bg-emerald-600 py-3 rounded font-bold">
            💾 حفظ المقايسة
        </button>
    </form>
</div>

<script>
const app = {
    items: null,
    descriptions: [],
    prices: [],
    delegateSignature: '',
    customerSignature: '',
    finalPrice: 0,

    itemOptions: ['رش وسمكرة','Protection','قطع غيار','أعمال كهرباء'],
    descriptionOptions: ['باب','رفرف','سقف','كبوت','شنطة'],
    priceOptions: [
        { category:'رش', sub:[
            {label:'A',price:10000},
            {label:'B',price:15000}
        ]},
        { category:'غير محدد', sub:[
            {label:'حسب الفحص',price:null}
        ]}
    ],

    init(){
        this.renderItems();
        this.renderDescriptions();
        this.renderPrices();
        this.initSignatures();
        document.getElementById('comparisonForm').addEventListener('submit',e=>{
            e.preventDefault();
            this.submitForm();
        });
    },

    /* ITEM – single choice */
    renderItems(){
        const c = document.getElementById('itemsContainer');
        c.innerHTML='';
        this.itemOptions.forEach(opt=>{
            const btn=document.createElement('button');
            btn.type='button';
            btn.textContent=opt;
            btn.disabled=this.items && this.items!==opt;
            btn.className=this.items===opt
                ?'p-2 bg-blue-600 rounded'
                :btn.disabled
                    ?'p-2 bg-slate-700 rounded cursor-not-allowed'
                    :'p-2 bg-slate-800 rounded hover:bg-blue-500';
            btn.onclick=()=>this.toggleItem(opt);
            c.appendChild(btn);
        });
    },

    toggleItem(opt){
        this.items=this.items===opt?null:opt;
        this.renderItems();
        this.updateTotal();
    },

    /* DESCRIPTION – multi */
    renderDescriptions(){
        const c=document.getElementById('descriptionsContainer');
        c.innerHTML='';
        this.descriptionOptions.forEach(opt=>{
            const btn=document.createElement('button');
            btn.type='button';
            btn.textContent=opt;
            btn.className=this.descriptions.includes(opt)
                ?'p-2 bg-purple-600 rounded'
                :'p-2 bg-slate-800 rounded hover:bg-purple-500';
            btn.onclick=()=>{
                const i=this.descriptions.indexOf(opt);
                i>-1?this.descriptions.splice(i,1):this.descriptions.push(opt);
                this.renderDescriptions();
                this.updateTotal();
            };
            c.appendChild(btn);
        });
    },

    /* PRICES */
    renderPrices(){
        const c=document.getElementById('pricesContainer');
        c.innerHTML='';
        this.priceOptions.forEach(g=>{
            const d=document.createElement('div');
            d.innerHTML=`<strong>${g.category}</strong>`;
            const grid=document.createElement('div');
            grid.className='grid grid-cols-2 gap-2 mt-2';
            g.sub.forEach(s=>{
                const b=document.createElement('button');
                b.type='button';
                b.textContent=s.label+' - '+(s.price??'يحدد لاحقاً');
                b.className=this.prices.includes(s.label)
                    ?'p-2 bg-amber-600 rounded'
                    :'p-2 bg-slate-800 rounded';
                b.onclick=()=>{
                    const i=this.prices.indexOf(s.label);
                    i>-1?this.prices.splice(i,1):this.prices.push(s.label);
                    this.renderPrices();
                    this.calcPrice();
                    this.updateTotal();
                };
                grid.appendChild(b);
            });
            d.appendChild(grid);
            c.appendChild(d);
        });
    },

    calcPrice(){
        let sum=0;
        let later=false;
        this.prices.forEach(p=>{
            this.priceOptions.forEach(g=>{
                g.sub.forEach(s=>{
                    if(s.label===p){
                        s.price==null?later=true:sum+=s.price;
                    }
                });
            });
        });
        this.finalPrice=later?`${sum} + يحدد لاحقاً`:sum;
        document.getElementById('finalPrice').value=this.finalPrice;
    },

    updateTotal(){
        const parts=[
            ...(this.items?[this.items]:[]),
            ...this.descriptions,
            ...this.prices
        ];
        document.getElementById('totalDisplay').textContent=
            parts.length?parts.join(' - '):'✨ اختر من الخيارات أعلاه';
    },

    initSignatures(){
        this.setupCanvas('delegateCanvas',v=>this.delegateSignature=v);
        this.setupCanvas('customerCanvas',v=>this.customerSignature=v);
    },

    setupCanvas(id,cb){
        const c=document.getElementById(id);
        const ctx=c.getContext('2d');
        let draw=false;
        c.onmousedown=e=>{draw=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY)};
        c.onmousemove=e=>{if(!draw)return;ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke()};
        c.onmouseup=()=>{draw=false;cb(c.toDataURL())};
    },

    submitForm(){
        const form = document.getElementById('comparisonForm');
        if(!form.reportValidity()){
            return; // show browser validation
        }

        const fd = new FormData(form);
        if(this.items) fd.set('item',this.items);
        this.descriptions.forEach(d=>fd.append('descriptions[]',d));
        this.prices.forEach(p=>fd.append('prices[]',p));
        fd.set('finalPrice',this.finalPrice);
        if(this.delegateSignature) fd.set('delegateSignature',this.delegateSignature);
        if(this.customerSignature) fd.set('customerSignature',this.customerSignature);

        fetch('/api/comparisons',{
            method:'POST',
            body:fd,
            credentials:'include' // send cookies
        })
        .then(async r=>{
            if(!r.ok){
                const errData = await r.json().catch(()=>null);
                const msg = errData && errData.message ? errData.message : `HTTP ${r.status}`;
                throw new Error(msg);
            }
            return r.json();
        })
        .then(()=>{
                document.getElementById('formError').textContent = '';
                alert('تم الحفظ بنجاح ✅');
                form.reset();
                this.items = null;
                this.descriptions = [];
                this.prices = [];
                this.finalPrice = 0;
                this.delegateSignature = '';
                this.customerSignature = '';
                this.renderItems();
                this.renderDescriptions();
                this.renderPrices();
                this.updateTotal();
            })
        .catch(err=>{
            console.error('submitForm error', err);
            const errEl = document.getElementById('formError');
            errEl.textContent = 'خطأ في الحفظ: ' + err.message;
            alert('خطأ في الحفظ ❌\n'+err.message);
        });
    }
};

document.addEventListener('DOMContentLoaded',()=>app.init());
</script>

</body>
</html>
