<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body {
    background-color: #000000;
    color: #f5f5f5;
    font-family: Arial, sans-serif;
    margin: 0;
}

.container {
    max-width: 1600px;
    margin: auto;
    padding: 20px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

header a {
    color: #cccccc;
    text-decoration: none;
}

header a:hover {
    color: #ffffff;
}

/* Sections */
.form-section,
.table-section {
    background-color: #000000;
    border: 1px solid #333333;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    overflow-x: auto;
}

/* Form grid */
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
}

/* Inputs */
input {
    padding: 6px 8px;
    border-radius: 8px;
    border: none;
    background: #000000;
    color: #ffffff;
}

input:focus {
    outline: none;
    box-shadow: none;
}

/* Buttons */
button,
button.accept,
button.delete,
.approve-btn {
    padding: 6px 8px;
    border-radius: 8px;
    border: none;
    background-color: #444444;
    color: #ffffff;
    cursor: pointer;
    font-weight: bold;
}

button:hover,
.approve-btn:hover {
    background-color: #555555;
}

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    background-color: #000000;
    position: relative; /* needed for the pseudo-element */
}

/* Gold line on the left */
table::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 1px;          /* thickness of the gold line */
    height: 100%;
    background-color: gold;
    border-radius: 2px;
}

/* Table cells */
th, td {
    padding: 6px;
    text-align: right;
    border: none; /* no inner borders */
}

/* Row hover */
tr:hover {
    background-color: #2a2a2a;
}

/* Error messages */
.error {
    color: #ff6b6b;
    margin-bottom: 10px;
}

/* Approved rows subtle gold */
tr.approved {
    background-color: rgba(255,215,0,0.08);
}
    </style>
</head>

<body>
    <div class="form-section">
        <h2>بحث</h2>
        <div style="display:flex; gap:10px;">
            <input id="phoneSearchInput" placeholder="ابحث برقم عاتف العميل" style="width:50%;">
        </div>
    </div>

    <div class="table-section">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>اليوم</th>
                    <th>التاريخ</th>
                    <th>اسم العميل</th>
                    <th>رقم الهاتف</th>
                </tr>
            </thead>
            <tbody id="appointmentsTable"></tbody>
        </table>
    </div>

    <script>
        let appointments = [];

        async function loadAppointments() {
            const tbody = document.getElementById("appointmentsTable");
            tbody.innerHTML = "";
            const res = await fetch("http://localhost:8000/appointment/get_appointments", { credentials: "include" });
            appointments = await res.json();
            renderAppointments(appointments);
        }

        function renderAppointments(forms) {
            const tbody = document.getElementById("appointmentsTable");
            tbody.innerHTML = "";

            forms.forEach(form => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td>${form.id}</td>
            <td>${form.day}</td>
            <td>${form.current_date || "-"}</td>
            <td>${form.customer_name || "-"}</td>
            <td>${form.customer_phone_number || "-"}</td>
            <td>
                <button class="delete" onclick="delete_appointment(${form.id})">حذف</button>
            </td>
        `;
                tbody.appendChild(tr);
            });
        }

        function applySearch() {
            const phoneQuery = document.getElementById("phoneSearchInput").value.toLowerCase();

            renderAppointments(
                appointments.filter(c =>
                    (c.customer_phone_number || "").toLowerCase().includes(phoneQuery)
                )
            );
        }
        
        async function delete_appointment(id) {
            const res = await fetch(`http://localhost:8000/appointment/delete_appointment/${id}`, {
                method: "DELETE",
                credentials: "include"
            });
            loadAppointments();
        }
        document.getElementById("phoneSearchInput").addEventListener("input", applySearch);
        loadAppointments();
    </script>
</body>
